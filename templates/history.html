<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Glowise History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static',filename='css/style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">

🌿 Glowise History

</a>

<a
href="/"
class="btn btn-success">

Back

</a>

</div>

</nav>

<div class="container py-5">

<div class="glass-card">

<h2>

📈 Skin Progress

</h2>

<canvas
id="scoreChart"
height="120">

</canvas>

</div>

<div class="glass-card mt-4">

<h2>

📷 Previous Analysis

</h2>

<div
id="historyContainer">

</div>

</div>

</div>

<script>

fetch("/api/history")

.then(res=>res.json())

.then(data=>{

let labels=[];

let scores=[];

let html="";

data.forEach(item=>{

labels.push(item.created_at);

scores.push(item.skin_score);

html+=`

<div class="card shadow mb-3">

<div class="card-body">

<div class="row">

<div class="col-md-3">

<img

src="/${item.image_path}"

class="img-fluid rounded">

</div>

<div class="col-md-9">

<h4>

⭐ ${item.skin_score}/100

</h4>

<p>

<b>

Skin Type:

</b>

${item.skin_type}

</p>

<p>

<b>

Date:

</b>

${item.created_at}

</p>

<button

class="btn btn-danger"

onclick="deleteAnalysis(${item.id})">

Delete

</button>

</div>

</div>

</div>

</div>

`;

});

document.getElementById(

"historyContainer"

).innerHTML=html;

new Chart(

document.getElementById(

"scoreChart"

),

{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Skin Score",

data:scores,

fill:true,

tension:.4

}]

}

}

);

});

function deleteAnalysis(id){

fetch(

"/api/delete/"+id,

{

method:"DELETE"

}

)

.then(()=>{

location.reload();

});

}

</script>

</body>

</html>
